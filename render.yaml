services:
  - type: web
    name: shopify-mirakl-integration
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: MIRAKL_API_URL
        value: https://nordstromus-prod.mirakl.net
      - key: MIRAKL_API_KEY
        sync: false
      - key: MIRAKL_SHOP_ID
        sync: false
      - key: SHOPIFY_SHOP_URL
        value: hairdrama-us.myshopify.com
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: SHOPIFY_API_VERSION
        value: 2026-04
      - key: SYNC_INTERVAL_MINUTES
        value: 15
      - key: SHOPIFY_PRODUCT_STATUS
        value: active
